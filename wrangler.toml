# Cloudflare Pages Wrangler Configuration
# This file provides compatibility settings for Cloudflare Pages deployment.
# It ensures nodejs_compat is always set, so users don't need to configure it manually.

name = "kvideo"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# account_id = "1257ea16508eb7649f32a7c005d7f00b"

# KV Namespace for Admin Account Storage
# Pages KV bindings must be configured via Cloudflare Dashboard:
# Project → Settings → Functions → KV namespace bindings
# KV namespace id: bdf9894fb8774fb1a4cb1ec3413d5494
# Binding name: KV_ACCOUNTS
# [[kv_namespaces]]
# binding = "KV_ACCOUNTS"
# id = "bdf9894fb8774fb1a4cb1ec3413d5494"

# Environment variables (secrets) are set via Cloudflare Dashboard or wrangler pages secret put
# ADMIN_PASSWORD and PREMIUM_PASSWORD are already set as secrets
