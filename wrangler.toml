# Cloudflare Pages Wrangler Configuration
# This file provides compatibility settings for Cloudflare Pages deployment.
# It ensures nodejs_compat is always set, so users don't need to configure it manually.

name = "kvideo"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# KV Namespace for Admin Account Storage
# Create in Cloudflare Dashboard: Workers & Pages > KV > Create Namespace "KV_ACCOUNTS"
# Then bind it below with the correct ID
[[kv_namespaces]]
binding = "KV_ACCOUNTS"
id = "" # ← 替换为你的 KV Namespace ID

[vars]
# Environment variables can be set here or in Cloudflare Dashboard
# ADMIN_PASSWORD = "your-admin-password"
# PREMIUM_PASSWORD = "l789789"
# ACCOUNTS = "pwd1:user1:admin,pwd2:user2:viewer"
